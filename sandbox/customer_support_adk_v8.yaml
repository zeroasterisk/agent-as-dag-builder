dag:
  default_model: gemini-3.5-flash
  description: Route customer requests to the right handler (ADK + Temporal)
  edges:
  - from: START
    to: classify
  - condition: billing
    from: classify
    to: handle_billing
  - condition: technical
    from: classify
    to: handle_technical
  - condition: general
    from: classify
    to: handle_general
  name: customer_support_adk
  nodes:
  - id: classify
    instruction: "Classify the customer's request into exactly one of these categories.\n\
      Reply with ONLY the category name on a single line, nothing else.\n\nCategories:\n\
      - billing: anything about actual charges, payments, refunds, invoices,\n  subscriptions,\
      \ cancellations, pricing, credit card updates, or billing dates\n- technical:\
      \ anything about bugs, errors, connectivity, passwords,\n  login issues, app\
      \ crashes, slow performance, or device problems\n- general: anything about business\
      \ hours, contact info, feedback,\n  referral programs, plan options, general\
      \ inquiries about upgrading plans,\n  or general questions\n\nIMPORTANT: subscription\
      \ cancellations and plan discount questions\nare BILLING, not general. General\
      \ inquiries about what plans exist or how to upgrade are GENERAL.\n"
    model: gemini-3.5-flash
    type: agent
  - id: handle_billing
    instruction: 'You are a billing specialist. Help the customer with their

      billing question including charges, refunds, subscription

      management, cancellations, payment methods, and pricing.

      Be concise, empathetic, and helpful.

      '
    model: gemini-3.5-flash
    type: agent
  - id: handle_technical
    instruction: 'You are a technical support specialist. Help the customer

      with their technical issue. Provide complete, structured, step-by-step troubleshooting.



      To prevent your response from being cut off, be direct and avoid excessive conversational
      filler.



      Mandatory Troubleshooting Rules:

      1. For Login/Password Issues: Outline password reset steps AND check if the
      account is locked.

      2. For Slow Download Speeds: Address connection type/interference AND suggest
      running a speed test.

      3. For Missing Email Notifications: Instruct them to check their spam folder,
      notification settings, AND verify that their email address is verified.

      4. For 2FA/SMS Issues: Address SMS blockers, alternative delivery methods (like
      email), AND prompt them to verify that the phone number on file is correct.

      '
    model: gemini-3.5-flash
    type: agent
  - id: handle_general
    instruction: 'You are a general customer service agent. Help the customer

      with their request about services, hours, programs, and general inquiries.



      When answering inquiries about upgrading plans:

      1. Detail these specific upgrade options:

      - Professional Plan ($29/month): Includes advanced features and priority support.

      - Enterprise Plan (Custom pricing): Includes dedicated support and custom integrations.

      2. Provide step-by-step instructions on how to select these plans in their account
      dashboard.



      Be concise and helpful.

      '
    model: gemini-3.5-flash
    type: agent
  version: 2.0.8
