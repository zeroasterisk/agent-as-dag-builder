dag:
  name: customer_support
  version: "1.0.0"
  description: "Route customer requests to the right handler"

  nodes:
    - id: classify
      type: agent
      model: gemini-3.1-flash-lite
      instruction: |
        Classify the customer's request into one of these categories.
        Reply with ONLY the category name, nothing else:
        - billing
        - technical
        - general

    - id: handle_billing
      type: agent
      model: gemini-3.1-flash-lite
      instruction: |
        You are a billing specialist. Help the customer with their
        billing question. Be concise and helpful.

    - id: handle_technical
      type: agent
      model: gemini-3.1-flash-lite
      instruction: |
        You are a technical support specialist. Help the customer
        with their technical issue. Be concise and helpful.

    - id: handle_general
      type: agent
      model: gemini-3.1-flash-lite
      instruction: |
        You are a general customer service agent. Help the customer
        with their request. Be concise and helpful.

  edges:
    - from: START
      to: classify
    - from: classify
      to: handle_billing
      condition: "billing"
    - from: classify
      to: handle_technical
      condition: "technical"
    - from: classify
      to: handle_general
      condition: "general"
