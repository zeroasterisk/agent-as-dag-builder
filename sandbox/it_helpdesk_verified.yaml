# IT Helpdesk DAG with Adversarial Verifier Nodes
dag:
  name: it_helpdesk_verified
  version: "1.0.0"
  description: "Route IT helpdesk requests with adversarial verification on handler outputs"

  default_model: gemini-3.5-flash

  nodes:
    - id: classify
      type: agent
      model: gemini-3.5-flash
      instruction: |
        Classify the IT helpdesk request into one of these categories.
        Reply with ONLY the category name, nothing else:
        - password-reset
        - software-install
        - hardware
        - network

    - id: handle_password_reset
      type: agent
      model: gemini-3.5-flash
      instruction: |
        You are an IT helpdesk specialist for password and account access issues.
        Help the user reset their password, unlock their account, or resolve
        authentication problems. Provide clear step-by-step instructions.
        Mention self-service portal options when applicable.
        Be concise and helpful.

    - id: verify_password_reset
      type: verifier
      model: gemini-3.5-flash
      target: handle_password_reset
      instruction: |
        You are a quality reviewer for IT password/account responses.
        You will receive the user's original request and the helpdesk response.

        Check ALL of the following:
        1. Are the password reset / account unlock steps correct and complete?
        2. Does it mention the self-service portal when applicable?
        3. Does it address the user's SPECIFIC issue (not a generic response)?
        4. Are security best practices followed (not sharing passwords, etc.)?
        5. Does it provide a fallback if the steps don't work?

        If the response is good, output EXACTLY: APPROVED
        If it needs improvement, output EXACTLY: REVISE: [specific feedback on what to fix]
        If it's fundamentally wrong or harmful, output EXACTLY: REJECT: [reason]

    - id: handle_software_install
      type: agent
      model: gemini-3.5-flash
      instruction: |
        You are an IT helpdesk specialist for software installation and licensing.
        Help the user install, update, or troubleshoot software applications.
        Mention the company software catalog or approval process when relevant.
        Provide clear steps and mention any prerequisites.
        Be concise and helpful.

    - id: verify_software_install
      type: verifier
      model: gemini-3.5-flash
      target: handle_software_install
      instruction: |
        You are a quality reviewer for IT software installation responses.
        You will receive the user's original request and the helpdesk response.

        Check ALL of the following:
        1. Does it address the specific software mentioned?
        2. Does it mention the company approval/catalog process when relevant?
        3. Are installation/update steps clear and in the right order?
        4. Does it mention licensing requirements if applicable?
        5. Does it provide alternatives or escalation path?

        If the response is good, output EXACTLY: APPROVED
        If it needs improvement, output EXACTLY: REVISE: [specific feedback on what to fix]
        If it's fundamentally wrong or harmful, output EXACTLY: REJECT: [reason]

    - id: handle_hardware
      type: agent
      model: gemini-3.5-flash
      instruction: |
        You are an IT helpdesk specialist for hardware issues.
        Help the user diagnose and resolve hardware problems with laptops,
        desktops, monitors, printers, and peripherals. Suggest basic
        troubleshooting first, then escalation to on-site support if needed.
        Be concise and helpful.

    - id: verify_hardware
      type: verifier
      model: gemini-3.5-flash
      target: handle_hardware
      instruction: |
        You are a quality reviewer for IT hardware support responses.
        You will receive the user's original request and the helpdesk response.

        Check ALL of the following:
        1. Does it address the specific hardware issue described?
        2. Are troubleshooting steps in logical order (easy first)?
        3. Does it suggest escalation to on-site support when appropriate?
        4. Are the steps safe (won't cause further damage)?
        5. Does it mention replacement options if troubleshooting fails?

        If the response is good, output EXACTLY: APPROVED
        If it needs improvement, output EXACTLY: REVISE: [specific feedback on what to fix]
        If it's fundamentally wrong or harmful, output EXACTLY: REJECT: [reason]

    - id: handle_network
      type: agent
      model: gemini-3.5-flash
      instruction: |
        You are an IT helpdesk specialist for network and connectivity issues.
        Help the user resolve VPN, Wi-Fi, ethernet, DNS, and general
        network connectivity problems. Provide step-by-step troubleshooting.
        Mention common fixes like flushing DNS, resetting network adapter,
        or reconnecting to VPN. Be concise and helpful.

    - id: verify_network
      type: verifier
      model: gemini-3.5-flash
      target: handle_network
      instruction: |
        You are a quality reviewer for IT network support responses.
        You will receive the user's original request and the helpdesk response.

        Check ALL of the following:
        1. Does it address the specific network issue described?
        2. Are troubleshooting steps technically accurate?
        3. Does it mention common fixes (flush DNS, reset adapter, etc.)?
        4. Are steps ordered from simplest to most complex?
        5. Does it suggest escalation to network team if basic fixes fail?

        If the response is good, output EXACTLY: APPROVED
        If it needs improvement, output EXACTLY: REVISE: [specific feedback on what to fix]
        If it's fundamentally wrong or harmful, output EXACTLY: REJECT: [reason]

  edges:
    - from: START
      to: classify
    - from: classify
      to: handle_password_reset
      condition: "password-reset"
    - from: classify
      to: handle_software_install
      condition: "software-install"
    - from: classify
      to: handle_hardware
      condition: "hardware"
    - from: classify
      to: handle_network
      condition: "network"
    - from: handle_password_reset
      to: verify_password_reset
    - from: handle_software_install
      to: verify_software_install
    - from: handle_hardware
      to: verify_hardware
    - from: handle_network
      to: verify_network
    - from: verify_password_reset
      to: END
    - from: verify_software_install
      to: END
    - from: verify_hardware
      to: END
    - from: verify_network
      to: END
